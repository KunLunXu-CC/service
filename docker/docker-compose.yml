version: '2'
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "100k"
    max-file: "20"

services:
  mongo:
    build: ./mongo/
    container_name: klx-mongo
    environment:
      - TZ=Asia/Shanghai
    expose:
      - 27017
    volumes:
      - ./store/mongo/db:/data/db
      - ./store/mongo/configdb:/data/configdb
      - ./store/mongo/backups:/data/backups
    logging: *default-logging
  service:
    build: ./service/
    container_name: klx-service
    ports:
      - 4000:4000
    links:
      - mongo
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - mongo
    command: sh -c '/shell/waitfor.sh mongo:27017 -- npm run start:pro'
    volumes:
      - ../:/var/service
    networks:
      - default
      - service_openclaw
    logging: *default-logging
  openclaw:
    build:
      context: ./openClaw/
      dockerfile: dockerfile
    container_name: klx-openclaw
    expose:
      - 18789
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./store/openclaw/config:/root/.openclaw
      - ./store/openclaw/work:/var/openClaw
    networks:
      - service_openclaw
    logging: *default-logging
  nginx:
    image: nginx
    container_name: klx-nginx
    environment:
      - TZ=Asia/Shanghai
    ports:
      - 80:80
      - 443:443
    # links:
    #   - node
    # depends_on:
    #   - node
    volumes:
      # - ./nginx/html:/usr/share/nginx/html
      - ./store/nginx/logs/:/var/log/nginx
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

      - ./nginx/ssl.pem:/etc/nginx/ssl.pem
      - ./nginx/ssl.key:/etc/nginx/ssl.key
    logging: *default-logging

networks:
  service_openclaw:
